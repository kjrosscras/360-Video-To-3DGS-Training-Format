name: 360pipeline
channels:
  - conda-forge
  - defaults

# CPU-only environment for the VREV 360 Pipeline.
#
# Important:
# - This intentionally avoids CUDA builds and CUDA runtime packages.
# - The build selector `cpu_*` is used for COLMAP / PyCOLMAP so conda-forge
#   does not solve to `cuda_*` builds like the previous environment did.
# - Do not re-export this environment with full build pins after solving unless
#   you verify no package/build contains cuda, cudart, cublas, cusolver, etc.

dependencies:
  # Core Python
  - python=3.10
  - pip
  - setuptools
  - wheel

  # COLMAP / PyCOLMAP CPU builds only
  - colmap=3.12.5=cpu_*
  - pycolmap=3.12.3=cpu_*

  # Scientific/runtime dependencies used by the pipeline
  - numpy
  - scipy=1.13.*
  - tqdm
  - pillow
  - requests
  - pyyaml
  - psutil
  - pywin32
  - pywinauto
  - pyinstaller

  # GUI / image/video helpers
  - pip:
      # Keep PyTorch CPU-only. The +cpu wheels are hosted on the PyTorch CPU wheel index.
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch==2.8.0+cpu
      - torchvision==0.23.0+cpu

      # App dependencies
      - certifi==2025.8.3
      - charset-normalizer==3.4.3
      - colorama==0.4.6
      - comtypes==1.4.12
      - contourpy==1.3.2
      - cycler==0.12.1
      - decorator==5.2.1
      - filelock==3.19.1
      - fonttools==4.59.2
      - fsspec==2025.9.0
      - idna==3.10
      - imageio==2.37.0
      - imageio-ffmpeg==0.6.0
      - jinja2==3.1.6
      - kiwisolver==1.4.9
      - markupsafe==3.0.2
      - matplotlib==3.10.6
      - moviepy==2.2.1
      - mpmath==1.3.0
      - networkx==3.4.2
      - opencv-python==4.12.0.88
      - polars==1.33.0
      - proglog==0.1.12
      - py-cpuinfo==9.0.0
      - pyparsing==3.2.3
      - python-dateutil==2.9.0.post0
      - python-dotenv==1.1.1
      - sympy==1.14.0
      - tkinterdnd2==0.4.3
      - ultralytics==8.3.193
      - ultralytics-thop==2.0.17
      - urllib3==2.5.0
